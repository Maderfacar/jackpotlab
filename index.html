<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>傑克帕德．萊勃 The Jackpot Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 'lab-bg': 'var(--bg-color)', 'lab-card': 'var(--card-color)', 'lab-border': 'var(--border-color)', 'lab-text': 'var(--text-main)', } 
                } 
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="h-screen flex flex-col lg:flex-row overflow-hidden bg-lab-bg text-lab-text">

    <header class="lg:hidden h-14 bg-lab-card border-b border-lab-border px-4 flex items-center justify-between sticky top-0 z-40">
        <button onclick="toggleSidebar()" class="p-2 text-cyan-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <div class="font-bold text-sm tracking-tighter uppercase">The Jackpot Lab</div>
        <div id="mobileUser" class="w-8 h-8 rounded-full bg-slate-200 overflow-hidden">
            <img id="userPictureMobile" src="" class="w-full h-full object-cover hidden">
        </div>
    </header>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-lab-card border-r border-lab-border z-50 flex flex-col -translate-x-full lg:translate-x-0 lg:relative lg:flex shrink-0 transition-transform duration-300">
        <div class="p-6 border-b border-lab-border flex justify-between items-center">
            <h1 class="font-black tracking-tighter text-lg uppercase italic">JACKPOT LAB</h1>
            <button onclick="toggleSidebar()" class="lg:hidden text-slate-400">✕</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 space-y-2 no-scrollbar">
            <div class="px-2 pb-2 text-[10px] font-bold text-slate-500 tracking-widest uppercase">功能模組控制</div>
            <label class="flex items-center justify-between p-4 bg-lab-bg rounded-xl border border-lab-border cursor-pointer transition hover:border-cyan-500">
                <div class="flex flex-col">
                    <span class="text-[10px] text-cyan-500 font-mono">#FN-001</span>
                    <span class="text-sm font-semibold">1-1 座標位移規律</span>
                </div>
                <input type="checkbox" checked class="w-5 h-5 rounded-full accent-cyan-500">
            </label>
        </div>
        <div class="p-4 border-t border-lab-border">
            <button onclick="toggleTheme()" class="w-full py-2 bg-lab-bg border border-lab-border rounded-lg text-xs font-bold transition hover:bg-slate-100 dark:hover:bg-slate-800">🌓 切換主題模式</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="hidden lg:flex h-20 bg-lab-card border-b border-lab-border px-8 items-center justify-end">
            <div id="liffLoginBtn" class="flex items-center gap-4 cursor-pointer">
                <div class="text-right">
                    <div id="userName" class="text-sm font-bold">Guest Login</div>
                    <div id="userId" class="text-[9px] font-mono text-cyan-500 tracking-tighter opacity-60 uppercase">Wait Authorization</div>
                </div>
                <div class="w-12 h-12 rounded-xl border border-lab-border overflow-hidden bg-slate-100 shadow-sm">
                    <img id="userPicture" src="" class="w-full h-full object-cover opacity-0 transition-opacity duration-300">
                </div>
            </div>
        </header>

        <div class="p-4 lg:p-8 space-y-6 overflow-y-auto no-scrollbar pb-32">
            <section class="bg-lab-card p-10 rounded-3xl border border-lab-border shadow-sm text-center relative">
                <div class="absolute top-6 right-8 bg-cyan-500 text-black px-3 py-1 rounded text-[10px] font-black italic">ANALYSIS</div>
                <h2 class="text-xs font-bold text-slate-400 mb-6 tracking-widest uppercase">Match Suggestion</h2>
                <div id="mainDisplay" class="w-32 h-32 rounded-full border-4 border-cyan-500 mx-auto flex items-center justify-center text-5xl font-mono font-bold text-cyan-500 resonance-pulse">18</div>
                <div class="mt-6 text-xl font-bold italic">Confidence: 88.5%</div>
            </section>
        </div>
    </main>

    <div id="toolbox" class="fixed bottom-6 right-6 w-80 glass-widget rounded-2xl z-50 flex flex-col overflow-hidden border border-lab-border shadow-2xl transition-all duration-500">
        <div class="flex items-center justify-between px-6 py-4 bg-lab-card border-b border-lab-border cursor-pointer" onclick="minimizeToolbox()">
            <span class="text-[11px] font-black tracking-widest text-cyan-500">TACTICAL SUITE</span>
            <span class="text-lg">−</span>
        </div>
        <div class="flex border-b border-lab-border">
            <button id="tabNotes" class="flex-1 py-3 text-[10px] font-bold border-b-2 border-cyan-500 text-cyan-500">NOTES</button>
            <button id="tabCalc" class="flex-1 py-3 text-[10px] font-bold text-slate-400">CALCULATOR</button>
        </div>
        <div id="p-notes" class="p-4 h-72 block">
            <textarea id="note-txt" placeholder="在此輸入分析記錄..." class="w-full h-full bg-transparent border-none text-sm outline-none resize-none leading-relaxed"></textarea>
        </div>
        <div id="p-calc" class="p-4 h-72 hidden flex flex-col">
            <div id="disp" class="bg-black/5 dark:bg-black/20 p-4 rounded-xl text-right font-mono text-2xl mb-4 h-14 flex items-center justify-end">0</div>
            <div class="grid grid-cols-4 gap-2 flex-1">
                <button onclick="cin('7')" class="calc-key">7</button>
                <button onclick="cin('8')" class="calc-key">8</button>
                <button onclick="cin('9')" class="calc-key">9</button>
                <button onclick="cin('/')" class="calc-op">÷</button>
                <button onclick="cin('4')" class="calc-key">4</button>
                <button onclick="cin('5')" class="calc-key">5</button>
                <button onclick="cin('6')" class="calc-key">6</button>
                <button onclick="cin('*')" class="calc-op">×</button>
                <button onclick="cin('1')" class="calc-key">1</button>
                <button onclick="cin('2')" class="calc-key">2</button>
                <button onclick="cin('3')" class="calc-key">3</button>
                <button onclick="cin('-')" class="calc-op">-</button>
                <button onclick="ccr()" class="calc-key text-red-500">C</button>
                <button onclick="cin('0')" class="calc-key">0</button>
                <button onclick="crs()" class="calc-key bg-cyan-500 text-white font-bold">=</button>
                <button onclick="cin('+')" class="calc-op">+</button>
            </div>
        </div>
    </div>

    <div id="dot" class="fixed bottom-8 right-8 w-14 h-14 rounded-full bg-cyan-500 items-center justify-center text-black font-black text-xs shadow-2xl z-50 cursor-pointer hidden" onclick="restoreToolbox()">工具</div>
    <div id="overlay" class="fixed inset-0 bg-black/50 z-40 hidden opacity-0 transition-opacity lg:hidden" onclick="toggleSidebar()"></div>

    <script src="main.js"></script>
</body>
</html>
