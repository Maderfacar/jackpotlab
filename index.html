<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>傑克帕德．萊勃 The Jackpot Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { 'lab-bg': 'var(--bg-color)', 'lab-card': 'var(--card-color)', 'lab-border': 'var(--border-color)', 'lab-text': 'var(--text-main)', } } }
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="h-screen flex flex-col lg:flex-row">

    <header class="lg:hidden h-14 bg-lab-card border-b border-lab-border px-4 flex items-center justify-between sticky top-0 z-40">
        <button id="menuBtn" class="p-2 bg-cyan-500 rounded-lg text-black font-bold text-xs">選單</button>
        <div class="font-black text-xs tracking-tighter uppercase">The Jackpot Lab</div>
        <button id="themeBtnMobile" class="text-xs p-2">🌓</button>
    </header>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-lab-card border-r border-lab-border z-50 flex flex-col -translate-x-full lg:translate-x-0 lg:relative lg:flex shrink-0 shadow-2xl lg:shadow-none transition-transform duration-300">
        <div class="p-6 border-b border-lab-border flex justify-between items-center">
            <h1 class="font-black tracking-tighter text-lg">JACKPOT LAB</h1>
            <button id="closeSidebar" class="lg:hidden p-2 text-slate-500">✕</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 space-y-4">
            <label class="flex items-center justify-between p-4 bg-lab-bg/50 rounded-2xl border border-lab-border">
                <div class="flex flex-col">
                    <span class="text-[10px] text-cyan-500 font-mono">#FN-001</span>
                    <span class="text-sm font-semibold">1-1 座標位移規律</span>
                </div>
                <input type="checkbox" checked class="w-5 h-5 rounded-full accent-cyan-500">
            </label>
        </div>
        <div class="p-4 border-t border-lab-border bg-black/10">
            <div id="userArea" class="flex items-center gap-3">
                <img id="userPicture" src="https://via.placeholder.com/40" class="w-10 h-10 rounded-full border border-cyan-500">
                <div class="overflow-hidden">
                    <p id="userName" class="text-xs font-bold truncate text-lab-text">未登入</p>
                    <p id="userId" class="text-[8px] opacity-50 truncate">ID: Guest</p>
                </div>
            </div>
            <button id="liffLoginBtn" class="mt-3 w-full py-2 bg-green-600 text-white text-[10px] font-bold rounded-lg hover:bg-green-500 transition">LINE 登入</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 overflow-y-auto">
        <header class="hidden lg:flex h-16 bg-lab-card border-b border-lab-border px-6 items-center justify-between">
            <button id="themeBtn" class="p-2 hover:bg-lab-bg rounded-lg">🌓 主題切換</button>
            <div class="flex items-center gap-3">
                <span class="text-[10px] font-bold text-green-500">SERVER ONLINE</span>
                <div id="pcUserImg" class="w-10 h-10 bg-slate-800 rounded-full border border-lab-border overflow-hidden">
                    <img id="userPicturePC" src="" class="w-full h-full object-cover">
                </div>
            </div>
        </header>

        <div class="p-4 lg:p-8 space-y-6 pb-24">
            <section class="bg-lab-card p-8 rounded-[2rem] border border-lab-border shadow-xl text-center relative overflow-hidden">
                <div class="absolute top-4 right-4 bg-cyan-500/10 text-cyan-500 px-3 py-1 rounded-full text-[10px] font-black">莊家破壞者</div>
                <h2 class="text-[10px] font-bold text-cyan-500 mb-6 tracking-widest uppercase">最強共振建議</h2>
                <div class="inline-flex flex-col items-center">
                    <div class="w-24 h-24 lg:w-32 lg:h-32 rounded-full bg-lab-bg border-4 border-cyan-500 flex items-center justify-center text-4xl lg:text-5xl font-black text-cyan-500 font-mono resonance-pulse">18</div>
                    <div class="mt-4 font-black italic text-xl">88.5%</div>
                </div>
            </section>
        </div>
    </main>

    <div id="overlay" class="fixed inset-0 bg-black/50 z-40 hidden opacity-0 transition-opacity"></div>

    <script src="main.js"></script>
</body>
</html>
