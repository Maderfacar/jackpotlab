<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RQL v2.1.1 - 539 專業移動面板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'lab-bg': 'var(--bg-color)',
                        'lab-card': 'var(--card-color)',
                        'lab-border': 'var(--border-color)',
                        'lab-text': 'var(--text-main)',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-color: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #1e293b;
            --base-font-size: 14px; /* 手機端預設略小以容納更多資訊 */
        }
        .dark {
            --bg-color: #0b0e14;
            --card-color: #151921;
            --border-color: #262c36;
            --text-main: #cbd5e1;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-size: var(--base-font-size);
            transition: background-color 0.3s, color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* 隱藏滾動條但保持功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .resonance-pulse {
            box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(6, 182, 212, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); }
        }

        .glass-widget {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .dark .glass-widget {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 側邊欄抽屜動畫 */
        #mobile-sidebar {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="h-screen flex flex-col lg:flex-row overflow-hidden">

    <aside id="mobile-sidebar" class="fixed inset-y-0 left-0 w-72 bg-lab-card border-r border-lab-border z-50 flex flex-col -translate-x-full lg:translate-x-0 lg:relative lg:flex shrink-0 shadow-2xl lg:shadow-none">
        <div class="p-5 border-b border-lab-border flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-6 h-6 bg-cyan-500 rounded text-black font-black text-center leading-6 text-xs">R</div>
                <h1 class="font-black tracking-tighter text-sm uppercase">Resonance Lab</h1>
            </div>
            <button onclick="toggleSidebar()" class="lg:hidden p-2 text-slate-500">✕</button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4 space-y-6 no-scrollbar">
            <section>
                <div class="flex justify-between items-center mb-4 px-2">
                    <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">物理行為規則</h3>
                </div>
                <div class="space-y-2">
                    <label class="flex items-center justify-between p-4 bg-lab-bg/50 rounded-2xl border border-lab-border active:scale-95 transition-transform">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-cyan-500 font-mono">#FN-001</span>
                            <span class="text-sm font-semibold">1-1 座標位移規律</span>
                        </div>
                        <input type="checkbox" checked class="w-5 h-5 rounded-full accent-cyan-500">
                    </label>
                    <label class="flex items-center justify-between p-4 bg-lab-bg/50 rounded-2xl border border-lab-border active:scale-95 transition-transform">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-slate-500 font-mono">#FN-002</span>
                            <span class="text-sm font-semibold text-lab-text">左側重心補償分析</span>
                        </div>
                        <input type="checkbox" class="w-5 h-5 rounded-full accent-cyan-500">
                    </label>
                </div>
            </section>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 relative">
        
        <header class="h-14 bg-lab-card/80 backdrop-blur border-b border-lab-border px-4 flex items-center justify-between sticky top-0 z-40">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="p-2 -ml-2 hover:bg-lab-bg rounded-lg lg:hidden">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div class="hidden sm:block h-5 w-px bg-lab-border mx-2"></div>
                <button onclick="toggleTheme()" class="text-xs font-bold px-2 py-1 bg-lab-bg rounded-md">🌓 主題</button>
            </div>

            <div class="flex flex-col items-end">
                <div class="text-[9px] text-slate-500 font-bold uppercase tracking-tighter">DATA STREAMING</div>
                <div class="text-[10px] font-mono font-bold text-green-500 leading-none">● 539_TW_2026</div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar pb-24">
            
            <section class="bg-lab-card p-6 rounded-[2rem] border border-lab-border shadow-lg relative overflow-hidden">
                <h2 class="text-[10px] font-bold text-cyan-500 mb-6 uppercase tracking-[0.2em]">最強共振號碼建議</h2>
                <div class="flex flex-col items-center justify-center py-4">
                    <div class="w-24 h-24 rounded-full bg-lab-bg border-4 border-cyan-500 flex items-center justify-center text-4xl font-black text-cyan-500 font-mono resonance-pulse">18</div>
                    <div class="mt-6 text-center">
                        <div class="text-2xl font-black italic">88.5%</div>
                        <div class="text-[10px] text-slate-500 font-bold tracking-widest uppercase">共振匹配度</div>
                    </div>
                </div>
            </section>

            <section class="bg-lab-card rounded-2xl border border-lab-border shadow-md overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left min-w-[300px]">
                        <thead class="text-[9px] text-slate-500 uppercase bg-lab-bg/30">
                            <tr>
                                <th class="px-4 py-3">規則 ID 與 名稱</th>
                                <th class="px-4 py-3 text-right">建議指向</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y border-lab-border text-xs">
                            <tr class="active:bg-cyan-500/5 transition">
                                <td class="px-4 py-4">
                                    <div class="font-bold">#001 座標規律</div>
                                    <div class="w-12 h-1 bg-cyan-500/20 rounded mt-1"></div>
                                </td>
                                <td class="px-4 py-4 text-right font-mono font-bold text-cyan-500 text-sm">18, 05, 12</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <div id="toolbox" class="fixed bottom-4 right-4 left-4 sm:left-auto sm:w-80 glass-widget rounded-[2rem] z-50 flex flex-col overflow-hidden hidden">
        <div class="flex items-center justify-between px-5 py-3 border-b border-black/5 dark:border-white/5 bg-black/5 cursor-pointer" onclick="minimize()">
            <span class="text-[10px] font-black text-cyan-600 dark:text-cyan-400 tracking-widest uppercase">戰術工具箱</span>
            <span class="text-[10px] opacity-50">✖ 關閉</span>
        </div>
        <div class="flex border-b border-black/5 dark:border-white/5">
            <button onclick="tab('notes')" id="t-n" class="flex-1 py-3 text-[10px] font-bold text-cyan-500 border-b-2 border-cyan-500 uppercase">便條紙</button>
            <button onclick="tab('calc')" id="t-c" class="flex-1 py-3 text-[10px] font-bold text-slate-400 uppercase">計算機</button>
        </div>

        <div id="p-notes" class="p-4 h-48 block">
            <textarea id="note-txt" placeholder="在此輸入分析..." class="w-full h-full bg-transparent border-none text-sm outline-none resize-none leading-relaxed text-slate-900 dark:text-slate-100"></textarea>
        </div>

        <div id="p-calc" class="p-4 h-48 hidden flex flex-col">
            <div id="disp" class="bg-white/50 dark:bg-black/40 p-2 rounded-xl text-right font-mono text-xl mb-2 shadow-inner">0</div>
            <div class="grid grid-cols-4 gap-1.5 flex-1">
                <button onclick="cin('7')" class="bg-black/5 dark:bg-white/5 rounded-lg text-xs font-bold">7</button>
                <button onclick="cin('8')" class="bg-black/5 dark:bg-white/5 rounded-lg text-xs font-bold">8</button>
                <button onclick="cin('9')" class="bg-black/5 dark:bg-white/5 rounded-lg text-xs font-bold">9</button>
                <button onclick="cin('/')" class="bg-cyan-500/10 text-cyan-500 rounded-lg text-xs font-bold">÷</button>
                <button onclick="ccr()" class="bg-red-500/10 text-red-500 rounded-lg text-xs font-bold">C</button>
                <button onclick="cin('0')" class="bg-black/5 dark:bg-white/5 rounded-lg text-xs font-bold">0</button>
                <button onclick="crs()" class="bg-cyan-500 text-white rounded-lg text-xs font-black">=</button>
                <button onclick="cin('+')" class="bg-cyan-500/10 text-cyan-500 rounded-lg text-xs font-bold">+</button>
            </div>
        </div>
    </div>

    <div id="dot" class="fixed bottom-6 right-6 w-12 h-12 rounded-full bg-cyan-500 flex items-center justify-center text-white font-black text-[10px] shadow-lg z-50 cursor-pointer" onclick="restore()">
        工具
    </div>

    <script>
        function toggleSidebar() {
            const sb = document.getElementById('mobile-sidebar');
            sb.classList.toggle('-translate-x-full');
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }

        function minimize() { 
            document.getElementById('toolbox').classList.add('hidden'); 
            document.getElementById('dot').classList.remove('hidden'); 
        }
        function restore() { 
            document.getElementById('toolbox').classList.remove('hidden'); 
            document.getElementById('dot').classList.add('hidden'); 
        }
        
        function tab(t) {
            document.getElementById('p-notes').style.display = t==='notes'?'block':'none';
            document.getElementById('p-calc').style.display = t==='calc'?'flex':'none';
            document.getElementById('t-n').className = `flex-1 py-3 text-[10px] font-bold uppercase ${t==='notes'?'text-cyan-500 border-b-2 border-cyan-500':'text-slate-400'}`;
            document.getElementById('t-c').className = `flex-1 py-3 text-[10px] font-bold uppercase ${t==='calc'?'text-cyan-500 border-b-2 border-cyan-500':'text-slate-400'}`;
        }

        let s = "";
        function cin(v) { s += v; document.getElementById('disp').innerText = s; }
        function ccr() { s = ""; document.getElementById('disp').innerText = "0"; }
        function crs() { try { s = eval(s).toString(); document.getElementById('disp').innerText = s; } catch { document.getElementById('disp').innerText = "ERR"; s = ""; } }

        const n = document.getElementById('note-txt');
        n.value = localStorage.getItem('rql_notes') || "";
        n.oninput = () => localStorage.setItem('rql_notes', n.value);
    </script>
</body>
</html>
