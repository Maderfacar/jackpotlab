<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>傑克帕德．萊勃 The Jackpot Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 'lab-bg': 'var(--bg-color)', 'lab-card': 'var(--card-color)', 'lab-border': 'var(--border-color)', 'lab-text': 'var(--text-main)', } 
                } 
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="min-h-screen flex flex-col lg:flex-row bg-lab-bg text-lab-text">

    <main class="flex-1 flex flex-col min-w-0 relative">
        <header class="hidden lg:flex h-20 bg-lab-card border-b border-lab-border px-8 items-center justify-end">
            </header>

        <div id="spa-container" class="pb-32">
            
            <section id="view-dashboard" class="spa-view p-4 lg:p-8 space-y-6">
                </section>

            <section id="view-terminal" class="spa-view hidden p-4 lg:p-8">
                <div class="bg-lab-card rounded-2xl border border-lab-border overflow-hidden flex flex-col">
                    <div class="p-4 border-b border-lab-border flex justify-between items-center">
                        <div class="font-bold text-xs uppercase tracking-widest text-cyan-500">Analysis Terminal</div>
                        <div class="text-[10px] text-slate-500">DATABASE: 539</div>
                    </div>

                    <div id="history-list" class="divide-y divide-lab-border">
                        <div class="h-64 flex items-center justify-center text-slate-500 text-sm italic">
                            數據引擎連線中...
                        </div>
                    </div>
                </div>
            </section>

            <section id="view-prediction" class="spa-view hidden p-4 lg:p-8">
                </section>
        </div>

        </main>
</body>
</html>
