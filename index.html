<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RQL v2.1.2 - 539 專業面板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'lab-bg': 'var(--bg-color)',
                        'lab-card': 'var(--card-color)',
                        'lab-border': 'var(--border-color)',
                        'lab-text': 'var(--text-main)',
                    }
                }
            }
        }
    </script>
    <style>
        :root { --bg-color: #f1f5f9; --card-color: #ffffff; --border-color: #e2e8f0; --text-main: #1e293b; }
        .dark { --bg-color: #0b0e14; --card-color: #151921; --border-color: #262c36; --text-main: #cbd5e1; }
        body { background-color: var(--bg-color); color: var(--text-main); transition: 0.3s; overflow-x: hidden; }
        
        /* 側邊欄抽屜動畫 */
        #sidebar { transition: transform 0.3s ease-in-out; }
        
        /* 共振動畫 */
        .resonance-pulse {
            box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(6, 182, 212, 0); }
            100% { transform: scale(0.95); }
        }
    </style>
</head>
<body class="h-screen flex flex-col lg:flex-row">

    <header class="lg:hidden h-14 bg-lab-card border-b border-lab-border px-4 flex items-center justify-between sticky top-0 z-40">
        <button onclick="toggleSidebar()" class="p-2 bg-cyan-500 rounded-lg text-black font-bold text-xs">選單</button>
        <div class="font-black text-xs tracking-tighter uppercase">Resonance Lab</div>
        <button onclick="toggleTheme()" class="text-xs p-2">🌓</button>
    </header>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-lab-card border-r border-lab-border z-50 flex flex-col -translate-x-full lg:translate-x-0 lg:relative lg:flex shrink-0 shadow-2xl lg:shadow-none">
        <div class="p-6 border-b border-lab-border flex justify-between items-center">
            <h1 class="font-black tracking-tighter text-lg">RQL LAB</h1>
            <button onclick="toggleSidebar()" class="lg:hidden p-2 text-slate-500">✕</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 space-y-4">
            <label class="flex items-center justify-between p-4 bg-lab-bg/50 rounded-2xl border border-lab-border">
                <div class="flex flex-col">
                    <span class="text-[10px] text-cyan-500 font-mono">#FN-001</span>
                    <span class="text-sm font-semibold">1-1 座標位移規律</span>
                </div>
                <input type="checkbox" checked class="w-5 h-5 rounded-full accent-cyan-500">
            </label>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 overflow-y-auto">
        <header class="hidden lg:flex h-16 bg-lab-card border-b border-lab-border px-6 items-center justify-between">
            <div class="flex gap-4">
                <button onclick="toggleTheme()" class="p-2 hover:bg-lab-bg rounded-lg">🌓 主題</button>
            </div>
            <div class="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center text-xs">U</div>
        </header>

        <div class="p-4 lg:p-8 space-y-6 pb-24">
            <section class="bg-lab-card p-8 rounded-[2rem] border border-lab-border shadow-xl text-center">
                <h2 class="text-[10px] font-bold text-cyan-500 mb-6 tracking-widest uppercase">最強共振建議</h2>
                <div class="inline-flex flex-col items-center">
                    <div class="w-24 h-24 lg:w-32 lg:h-32 rounded-full bg-lab-bg border-4 border-cyan-500 flex items-center justify-center text-4xl lg:text-5xl font-black text-cyan-500 font-mono resonance-pulse">18</div>
                    <div class="mt-4 font-black italic text-xl">88.5%</div>
                </div>
            </section>

            <section class="bg-lab-card rounded-2xl border border-lab-border shadow-lg overflow-x-auto">
                <table class="w-full text-left min-w-[300px]">
                    <thead class="text-[10px] text-slate-500 bg-lab-bg/50">
                        <tr><th class="px-6 py-3">規則 ID 與 名稱</th><th class="px-6 py-3 text-right">建議</th></tr>
                    </thead>
                    <tbody class="divide-y border-lab-border">
                        <tr>
                            <td class="px-6 py-4 text-sm font-bold">#001 座標位移</td>
                            <td class="px-6 py-4 text-right font-mono font-bold text-cyan-500">18, 05, 12</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </main>

    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden opacity-0 transition-opacity"></div>

    <script>
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            if (sb.classList.contains('-translate-x-full')) {
                sb.classList.remove('-translate-x-full');
                ov.classList.remove('hidden');
                setTimeout(() => ov.classList.add('opacity-100'), 10);
            } else {
                sb.classList.add('-translate-x-full');
                ov.classList.remove('opacity-100');
                setTimeout(() => ov.classList.add('hidden'), 300);
            }
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }
    </script>
</body>
</html>
